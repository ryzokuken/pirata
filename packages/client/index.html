<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pirata</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: #1b2129;
        --border: #3a4453;
        --ink: #e8e0c9;
        --accent: #d9a441;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #101418;
        color: var(--ink);
        font-family: system-ui, sans-serif;
      }
      #app {
        display: grid;
        gap: 8px;
        padding: 8px;
        justify-content: center;
      }
      #hud {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        font-size: 14px;
      }
      #hint {
        color: #8a93a3;
      }
      #stage {
        display: grid;
        grid-template-columns: auto 200px;
        gap: 8px;
        align-items: start;
      }
      #side {
        display: grid;
        gap: 8px;
      }
      #reputation,
      #inventory {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        font-size: 13px;
      }
      #reputation h2,
      #inventory h2 {
        margin: 0 0 6px;
        font-size: 13px;
        color: var(--accent);
      }
      #reputation ul,
      #inventory ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
      }
      #dialogue,
      #trade {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px 14px;
        max-width: 640px;
      }
      #dialogue h2,
      #trade h2 {
        margin: 0 0 4px;
        font-size: 14px;
        color: var(--accent);
      }
      #trade h3 {
        margin: 8px 0 4px;
        font-size: 12px;
        color: #8a93a3;
      }
      #dialogue p {
        margin: 0 0 8px;
      }
      #dialogue ol,
      #trade ol {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
        counter-reset: choice;
      }
      #dialogue button,
      #trade button {
        width: 100%;
        text-align: left;
        background: #232b36;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        font: inherit;
        cursor: pointer;
      }
      #dialogue button::before {
        counter-increment: choice;
        content: counter(choice) ". ";
        color: var(--accent);
      }
      #dialogue button:hover,
      #dialogue button:focus-visible,
      #trade button:hover,
      #trade button:focus-visible {
        border-color: var(--accent);
      }
      #toast {
        position: fixed;
        inset-inline: 0;
        bottom: 12px;
        margin: auto;
        width: fit-content;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header id="hud">
        <span id="clock" data-testid="clock"></span>
        <span id="hint"
          >Arrows/WASD move · E talk · Space wait · C sneak · G take · P pickpocket · T trade · 1-5
          choose</span
        >
      </header>
      <div id="stage">
        <main id="game" aria-label="Pirata game canvas"></main>
        <div id="side">
          <aside id="reputation" aria-label="Reputation">
            <h2>Reputation</h2>
            <ul id="reputation-list"></ul>
          </aside>
          <aside id="inventory" aria-label="Inventory">
            <h2>Purse &amp; bag</h2>
            <p id="coin" data-testid="coin"></p>
            <ul id="inventory-list"></ul>
          </aside>
        </div>
      </div>
      <section id="dialogue" role="dialog" aria-label="Conversation" hidden>
        <h2 id="dialogue-name"></h2>
        <p id="dialogue-text" data-testid="dialogue-text"></p>
        <ol id="dialogue-choices"></ol>
      </section>
      <section id="trade" role="dialog" aria-label="Trade" hidden>
        <h2 id="trade-name"></h2>
        <h3>Their wares</h3>
        <ol id="trade-stock"></ol>
        <h3>Your goods</h3>
        <ol id="trade-goods"></ol>
        <button type="button" id="trade-close">Done (Esc)</button>
      </section>
    </div>
    <div id="toast" role="status" hidden></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
